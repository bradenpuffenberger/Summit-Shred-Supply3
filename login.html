<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summit Shred Supply - Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <div class="auth-container">
      <div class="auth-panel">
        <div class="auth-header">
          <h1>Summit Shred Supply</h1>
          <p class="auth-tagline">Your source for premium shred gear</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
          <h2>Sign In</h2>
          
          <div class="form-group">
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" name="username" required />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" required />
          </div>

          <button type="submit" class="btn btn-primary">Sign In</button>

          <p class="form-toggle">
            Don't have an account? <a href="#" onclick="toggleForms()">Sign Up</a>
          </p>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form">
          <h2>Create Account</h2>

          <div class="form-group">
            <label for="signupUsername">Username</label>
            <input type="text" id="signupUsername" name="username" required />
          </div>

          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" name="password" required />
          </div>

          <div class="form-group">
            <label for="signupConfirmPassword">Confirm Password</label>
            <input type="password" id="signupConfirmPassword" name="confirmPassword" required />
          </div>

          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" name="email" required />
          </div>

          <div class="form-group">
            <label for="signupFullName">Full Name</label>
            <input type="text" id="signupFullName" name="fullName" required />
          </div>

          <div class="form-group">
            <label for="signupPhone">Phone Number</label>
            <input type="tel" id="signupPhone" name="phone" required />
          </div>

          <div class="form-group">
            <label for="signupUserType">Account Type</label>
            <select id="signupUserType" name="userType" required>
              <option value="">Select an option</option>
              <option value="BUYER">Buyer</option>
              <option value="SELLER">Seller</option>
              <option value="BOTH">Buyer & Seller</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary">Create Account</button>

          <p class="form-toggle">
            Already have an account? <a href="#" onclick="toggleForms()">Sign In</a>
          </p>
        </form>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message"></div>

        <!-- Success Message -->
        <div id="successMessage" class="success-message"></div>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
