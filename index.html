<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summit Shred Supply</title>

    <link rel="stylesheet" href="homepage.css" />
    <script src="items.js"></script>
  </head>

  <body>
    <header>
      <h1>Summit Shred Supply</h1>
      <div class="header-actions">
        <span id="userGreeting" class="user-greeting"></span>
        <button class="btn profile-btn" id="profileBtn" type="button">Profile</button>
        <button class="btn logout-btn" id="logoutBtn" type="button">Logout</button>
      </div>
    </header>

    <main class="page">
      <aside class="categories" aria-label="Product Categories">
        <h2>Categories</h2>
        <ul class="category-list" id="categoryList">
          <li class="category-item" data-category="All">All</li>
        </ul>
      </aside>

      <section class="content">
        <div class="content-header">
          <h2 class="content-title">Items</h2>
          <p class="content-subtitle" id="filterLabel">Showing: All</p>
        </div>

        <div class="items" id="items">
          <!-- Items populated by JavaScript -->
        </div>
      </section>
    </main>

    <button class="btn chat-btn" id="chatBtn" type="button">Chat</button>

    <!-- Profile Modal -->
    <div class="modal" id="profileModal" aria-hidden="true">
      <div class="modal__overlay" data-close></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-label="Profile">
        <div class="modal__header">
          <div class="modal__title">Profile</div>
          <button class="btn btn--small" type="button" data-close>Close</button>
        </div>
        <div class="modal__body">
          <div class="profile-row"><span class="label">Username:</span> <span class="value" id="profileUsername"></span></div>
          <div class="profile-row"><span class="label">Full Name:</span> <span class="value" id="profileFullName"></span></div>
          <div class="profile-row"><span class="label">Email:</span> <span class="value" id="profileEmail"></span></div>
          <div class="profile-row"><span class="label">Phone:</span> <span class="value" id="profilePhone"></span></div>
          <div class="profile-row"><span class="label">Account Type:</span> <span class="value" id="profileUserType"></span></div>
          <div class="profile-row"><span class="label">Member Since:</span> <span class="value" id="profileMemberSince"></span></div>
        </div>
      </div>
    </div>

    <!-- Chat Modal -->
    <div class="modal" id="chatModal" aria-hidden="true">
      <div class="modal__overlay" data-close></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-label="Chat">
        <div class="modal__header">
          <div class="modal__title">Chat</div>
          <button class="btn btn--small" type="button" data-close>Close</button>
        </div>
        <div class="modal__body">
          <div class="chat">
            <div class="chat__msg chat__msg--them">
              <div class="chat__bubble">Hey! Need help finding the right board?</div>
            </div>
            <div class="chat__msg chat__msg--me">
              <div class="chat__bubble">Yeah—something good for all-mountain.</div>
            </div>
            <div class="chat__msg chat__msg--them">
              <div class="chat__bubble">Check out the Summit Carver 155. Great stability and edge hold.</div>
            </div>
          </div>
          <div class="chat__inputRow">
            <input class="chat__input" type="text" placeholder="Type a message…" disabled />
            <button class="btn btn--small" type="button" disabled>Send</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Auth check - redirect to login if not authenticated
      function checkAuth() {
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
          window.location.href = 'login.html';
          return null;
        }
        return JSON.parse(currentUser);
      }

      const currentUser = checkAuth();

      // Display user greeting
      document.getElementById('userGreeting').textContent = `Welcome, ${currentUser.username}!`;

      // Logout functionality
      document.getElementById('logoutBtn').addEventListener('click', function() {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
      });

      const chatBtn = document.getElementById('chatBtn');
      const profileBtn = document.getElementById('profileBtn');

      const chatModal = document.getElementById('chatModal');
      const profileModal = document.getElementById('profileModal');

      const itemsEl = document.getElementById('items');
      const filterLabel = document.getElementById('filterLabel');
      const categoryList = document.getElementById('categoryList');

      function setModalOpen(modalEl, open) {
        if (!modalEl) return;
        modalEl.classList.toggle('is-open', open);
        modalEl.setAttribute('aria-hidden', String(!open));
      }

      function closeAllModals() {
        setModalOpen(chatModal, false);
        setModalOpen(profileModal, false);
      }

      chatBtn?.addEventListener('click', () => setModalOpen(chatModal, true));
      profileBtn?.addEventListener('click', () => {
        // Populate profile data
        document.getElementById('profileUsername').textContent = currentUser.username;
        document.getElementById('profileFullName').textContent = currentUser.fullName;
        document.getElementById('profileEmail').textContent = currentUser.email;
        document.getElementById('profileUserType').textContent = currentUser.userType;
        
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.userId === currentUser.userId);
        if (user) {
          document.getElementById('profilePhone').textContent = user.phone;
          const memberDate = new Date(user.createdAt).toLocaleDateString();
          document.getElementById('profileMemberSince').textContent = memberDate;
        }
        
        setModalOpen(profileModal, true);
      });

      document.addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.matches('[data-close]')) {
          closeAllModals();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeAllModals();
      });

      // Populate categories dynamically
      function populateCategories() {
        const categories = getCategories();
        const categoryItems = categoryList.querySelectorAll('.category-item:not([data-category="All"])');
        categoryItems.forEach(item => item.remove());
        
        categories.forEach(category => {
          const li = document.createElement('li');
          li.className = 'category-item';
          li.setAttribute('data-category', category);
          li.textContent = category;
          categoryList.appendChild(li);
        });
      }

      // Render items
      function renderItems(items) {
        itemsEl.innerHTML = '';
        items.forEach(item => {
          const article = document.createElement('article');
          article.className = 'item-card';
          article.setAttribute('data-category', item.category);
          
          const imageUrl = item.imageUrls[0] || '/images/placeholder.jpg';
          article.innerHTML = `
            <div class="item-image">
              <img src="${imageUrl}" alt="${item.itemName}">
            </div>
            <div class="item-name">${item.itemName}</div>
            <div class="item-description">${item.description.substring(0, 100)}...</div>
            <div class="item-meta">Category: ${item.category}</div>
            <div class="item-price">$${(item.price / 100).toFixed(2)}</div>
          `;
          
          itemsEl.appendChild(article);
        });
      }

      function applyCategoryFilter(category) {
        const normalized = category || 'All';
        filterLabel.textContent = `Showing: ${normalized}`;

        const items = getItemsByCategory(normalized);
        renderItems(items);
      }

      categoryList?.addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const item = target.closest('.category-item');
        if (!item) return;
        const category = item.getAttribute('data-category') || item.textContent || 'All';
        applyCategoryFilter(category.trim());
      });

      // Initialize
      populateCategories();
      applyCategoryFilter('All');
    </script>
  </body>
</html>
