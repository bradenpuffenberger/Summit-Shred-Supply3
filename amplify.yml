version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir . --outputs-format json
frontend:
  phases:
    preBuild:
      commands:
        - echo "Dependencies installed during backend build"
    build:
      commands:
        - echo "Building static site"
  artifacts:
    baseDirectory: .
    files:
      - index.html
      - auth.html
      - auth.js
      - auth-config.js
      - homepage.css
      - items.js
      - amplify_outputs.json
      - images/**/*
      - HomePage/**/*
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
