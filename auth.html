<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summit Shred Supply - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/homepage.css" />
    <style>
      .auth-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg-solid);
        padding: 20px;
      }

      .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--s1);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 40px;
        box-shadow: var(--sh-card);
      }

      .auth-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 30px;
        justify-content: center;
      }

      .auth-header svg {
        width: 32px;
        height: 32px;
        color: var(--accent);
      }

      .auth-header h1 {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, #e2e8f0 0%, #93c5fd 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0;
      }

      .auth-tabs {
        display: flex;
        gap: 12px;
        margin-bottom: 28px;
        border-bottom: 1px solid var(--border);
      }

      .auth-tab {
        flex: 1;
        padding: 12px;
        background: none;
        border: none;
        color: var(--text-2);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: color var(--t);
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }

      .auth-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .auth-form {
        display: none;
      }

      .auth-form.active {
        display: block;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-2);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .form-group input {
        width: 100%;
        padding: 10px 12px;
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        color: var(--text);
        font-size: 14px;
        transition: border-color var(--t), background var(--t);
        font-family: inherit;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--accent);
        background: var(--s3);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .form-group input::placeholder {
        color: var(--text-3);
      }

      .form-error {
        color: #ef4444;
        font-size: 13px;
        margin-top: 4px;
        display: none;
      }

      .form-error.show {
        display: block;
      }

      .auth-button {
        width: 100%;
        padding: 11px 16px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: var(--r-md);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background var(--t), box-shadow var(--t);
        margin-top: 8px;
      }

      .auth-button:hover {
        background: var(--accent-hi);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .auth-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .auth-button.secondary {
        background: var(--s2);
        color: var(--text-2);
        border: 1px solid var(--border);
      }

      .auth-button.secondary:hover {
        background: var(--s3);
        color: var(--text);
      }

      .auth-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0;
        color: var(--text-3);
        font-size: 12px;
      }

      .auth-divider::before,
      .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .auth-message {
        padding: 12px;
        border-radius: var(--r-md);
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }

      .auth-message.show {
        display: block;
      }

      .auth-message.success {
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.2);
      }

      .auth-message.error {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .loading {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body style="margin: 0; padding: 0;">
    <div class="auth-page">
      <div class="auth-card">
        <!-- Header -->
        <div class="auth-header">
          <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <path d="M16 3L30 27H2L16 3Z" fill="currentColor" opacity=".12"/>
            <path d="M16 8L27 26H5L16 8Z" fill="currentColor" opacity=".28"/>
            <path d="M16 14L22 25H10L16 14Z" fill="currentColor" opacity=".65"/>
            <path d="M16 18L19 24H13L16 18Z" fill="currentColor"/>
          </svg>
          <h1>Summit Shred Supply</h1>
        </div>

        <!-- Message -->
        <div id="authMessage" class="auth-message"></div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" type="button" data-tab="login">Sign In</button>
          <button class="auth-tab" type="button" data-tab="signup">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required />
            <div class="form-error" id="loginEmailError"></div>
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
            <div class="form-error" id="loginPasswordError"></div>
          </div>

          <button type="submit" class="auth-button" id="loginBtn">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form">
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" required />
            <div class="form-error" id="signupEmailError"></div>
          </div>

          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="At least 8 characters" required />
            <div class="form-error" id="signupPasswordError"></div>
          </div>

          <div class="form-group">
            <label for="signupConfirmPassword">Confirm Password</label>
            <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required />
            <div class="form-error" id="signupConfirmError"></div>
          </div>

          <button type="submit" class="auth-button" id="signupBtn">Create Account</button>
        </form>

        <!-- Confirm Signup Form -->
        <form id="confirmForm" class="auth-form">
          <div class="form-group">
            <label for="confirmEmail">Email</label>
            <input type="email" id="confirmEmail" placeholder="you@example.com" required />
            <div class="form-error" id="confirmEmailError"></div>
          </div>

          <div class="form-group">
            <label for="confirmCode">Confirmation Code</label>
            <input type="text" id="confirmCode" inputmode="numeric" placeholder="123456" required />
            <div class="form-error" id="confirmCodeError"></div>
          </div>

          <button type="submit" class="auth-button" id="confirmBtn">Confirm Email</button>
          <button type="button" class="auth-button secondary" id="resendCodeBtn">Send New Code</button>
        </form>
      </div>
    </div>

    <script>
      // Keep the auth tabs usable even if the Amplify module import is blocked or still loading.
      window.addEventListener('error', event => {
        const source = String(event.filename || event.message || '');
        if (source.includes('auth.js') || source.includes('esm.sh') || source.includes('aws-amplify')) {
          window.summitAuthModuleError = 'Auth failed while loading Amplify. Check your internet connection and the browser console for the blocked module URL.';
        }
      });

      window.addEventListener('unhandledrejection', event => {
        const reason = String(event.reason?.message || event.reason || '');
        if (reason.includes('auth.js') || reason.includes('esm.sh') || reason.includes('aws-amplify') || reason.includes('Failed to fetch')) {
          window.summitAuthModuleError = 'Auth failed while loading Amplify. Check your internet connection and the browser console for the blocked module URL.';
        }
      });

      document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', event => {
          const tabName = event.currentTarget.dataset.tab;
          document.querySelectorAll('.auth-tab').forEach(item => {
            item.classList.toggle('active', item.dataset.tab === tabName);
          });
          document.querySelectorAll('.auth-form').forEach(form => {
            form.classList.toggle('active', form.id === `${tabName}Form`);
          });
          const messageEl = document.getElementById('authMessage');
          messageEl.className = 'auth-message';
          messageEl.textContent = '';
        });
      });

      document.querySelectorAll('.auth-form').forEach(form => {
        form.addEventListener('submit', async event => {
          if (window.summitAuthModuleLoaded) return;
          event.preventDefault();

          if (form.id === 'signupForm') {
            await fallbackSignUp();
            return;
          }

          if (form.id === 'confirmForm') {
            await fallbackConfirmSignUp();
            return;
          }

          showFallbackMessage(window.summitAuthModuleError || 'Sign in is still loading Amplify. Check your internet connection and the browser console for blocked module URLs.', 'error');
        });
      });

      document.getElementById('resendCodeBtn').addEventListener('click', async event => {
        if (window.summitAuthModuleLoaded) return;
        event.preventDefault();
        await fallbackResendCode();
      });

      function showFallbackMessage(text, type) {
        const messageEl = document.getElementById('authMessage');
        messageEl.textContent = text;
        messageEl.className = `auth-message show ${type}`;
      }

      function showFallbackError(fieldId, message) {
        const errorEl = document.getElementById(fieldId);
        if (!errorEl) return;
        errorEl.textContent = message;
        errorEl.classList.add('show');
      }

      function clearFallbackErrors() {
        document.querySelectorAll('.form-error').forEach(el => {
          el.textContent = '';
          el.classList.remove('show');
        });
      }

      function setFallbackForm(formName) {
        document.querySelectorAll('.auth-tab').forEach(item => {
          item.classList.toggle('active', item.dataset.tab === formName);
        });
        document.querySelectorAll('.auth-form').forEach(item => {
          item.classList.toggle('active', item.id === `${formName}Form`);
        });
      }

      async function getFallbackAuthConfig() {
        for (const path of ['/amplify_outputs.json', '/amplifyconfiguration.json']) {
          try {
            const response = await fetch(path, { cache: 'no-store' });
            if (!response.ok) continue;
            const config = await response.json();
            const auth = config.auth || config.Auth?.Cognito || {};
            const region = auth.aws_region || auth.region;
            const clientId = auth.user_pool_client_id || auth.userPoolClientId || auth.userPoolWebClientId;
            if (region && clientId) return { region, clientId };
          } catch {
            // Try the next known config file.
          }
        }
        throw new Error('Missing Amplify config. Run npx ampx sandbox so amplify_outputs.json exists.');
      }

      async function cognitoFallback(target, payload) {
        const { region, clientId } = await getFallbackAuthConfig();
        const response = await fetch(`https://cognito-idp.${region}.amazonaws.com/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-amz-json-1.1',
            'X-Amz-Target': `AWSCognitoIdentityProviderService.${target}`,
          },
          body: JSON.stringify({ ClientId: clientId, ...payload }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.message || data.__type || `${target} failed`);
        return data;
      }

      function getFallbackError(error) {
        const message = error?.message || 'Something went wrong. Please try again.';
        if (message.includes('UsernameExistsException')) return 'An account with that email already exists. Try signing in.';
        if (message.includes('InvalidPasswordException')) return 'Password must meet the Cognito policy: uppercase, lowercase, number, and symbol.';
        if (message.includes('CodeMismatchException')) return 'That confirmation code is not correct.';
        if (message.includes('ExpiredCodeException')) return 'That confirmation code expired. Send a new code and try again.';
        return message;
      }

      async function fallbackSignUp() {
        clearFallbackErrors();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirmPassword = document.getElementById('signupConfirmPassword').value;

        if (!email) return showFallbackError('signupEmailError', 'Email is required');
        if (!password) return showFallbackError('signupPasswordError', 'Password is required');
        if (password.length < 8) return showFallbackError('signupPasswordError', 'Password must be at least 8 characters');
        if (password !== confirmPassword) return showFallbackError('signupConfirmError', 'Passwords do not match');

        try {
          await cognitoFallback('SignUp', {
            Username: email,
            Password: password,
            UserAttributes: [{ Name: 'email', Value: email }],
          });
          document.getElementById('confirmEmail').value = email;
          document.getElementById('signupForm').reset();
          setFallbackForm('confirm');
          showFallbackMessage('Account created. Enter the confirmation code from your email.', 'success');
        } catch (error) {
          showFallbackMessage(getFallbackError(error), 'error');
        }
      }

      async function fallbackConfirmSignUp() {
        clearFallbackErrors();
        const email = document.getElementById('confirmEmail').value.trim();
        const code = document.getElementById('confirmCode').value.trim();

        if (!email) return showFallbackError('confirmEmailError', 'Email is required');
        if (!code) return showFallbackError('confirmCodeError', 'Confirmation code is required');

        try {
          await cognitoFallback('ConfirmSignUp', {
            Username: email,
            ConfirmationCode: code,
          });
          document.getElementById('loginEmail').value = email;
          document.getElementById('confirmForm').reset();
          setFallbackForm('login');
          showFallbackMessage('Email confirmed. You can sign in now.', 'success');
        } catch (error) {
          showFallbackMessage(getFallbackError(error), 'error');
        }
      }

      async function fallbackResendCode() {
        clearFallbackErrors();
        const email = document.getElementById('confirmEmail').value.trim();
        if (!email) return showFallbackError('confirmEmailError', 'Email is required to resend a code');

        try {
          await cognitoFallback('ResendConfirmationCode', { Username: email });
          showFallbackMessage('A new confirmation code was sent.', 'success');
        } catch (error) {
          showFallbackMessage(getFallbackError(error), 'error');
        }
      }
    </script>

    <!-- Amplify Gen 2 Auth -->
    <script
      type="module"
      src="/auth.js"
      onerror="window.summitAuthModuleError = 'Auth failed to load /auth.js. Use Live Server from the project root and check the browser console for the blocked file.'"
    ></script>
  </body>
</html>
